name: Update Blocklist

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Generate blocklist
        run: python scripts/generate_blocklist.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # Add all changes in the scripts directory safely
          git add scripts/
          # Only commit if there are changes
          if [ -n "$(git status --porcelain scripts/)" ]; then
            git commit -m "Auto-update blocklist (v$(cat scripts/version.txt))"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit"
          fi
